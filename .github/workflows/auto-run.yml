name: 🚀 自动执行 IPTV 和 Legado 脚本

# 触发器配置
on:
  # 1. 允许手动点击运行（在 Actions 标签页）
  workflow_dispatch:

  # 2. 定时自动运行（可选）：设置为每天北京时间 08:00 执行
  # 注意：GitHub 使用 UTC 时间，北京时间 8:00 = UTC 0:00
  schedule:
    - cron: '0 0 * * *'

# 任务定义
jobs:
  run-scripts:
    # 运行环境：使用 Ubuntu (Linux)
    # 注意：如果你的脚本严重依赖 macOS 特有的命令，可能需要使用 macos-latest，但速度较慢且费用较高
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # 步骤 1: 检出代码
      # ---------------------------------------------------
      - name: 📥 拉取仓库代码
        uses: actions/checkout@v5

      # ---------------------------------------------------
      # 步骤 2: 处理代理 (关键步骤)
      # ---------------------------------------------------
      # 你可以在工作流中直接修改脚本内容：
      - name: 🛠️ 修复脚本
        run: |
          # 检查脚本内容
          cat run.sh
          # 使用 sed 命令删除包含 "proxy" 的第一行
          sed -i '1d' run.sh
          # 查看修改后的脚本确认
          cat run.sh

      # ---------------------------------------------------
      # 步骤 3: 执行脚本
      # ---------------------------------------------------
      - name: ⚙️ 赋予执行权限并运行
        run: |
          # 给脚本添加可执行权限
          chmod +x run.sh
          
          # 运行脚本
          # 注意：GitHub Actions 中的路径是 Linux 风格的
          # 原脚本中的 /Users/... 路径在 Linux 容器中是不存在的，但因为我们已经 checkout 了代码
          # 相对路径或者直接执行应该没问题，但如果脚本里硬编码了绝对路径，可能会报错
          ./run.sh

      # ---------------------------------------------------
      # 步骤 4: 如果有文件更新，自动创建合并请求
      # ---------------------------------------------------
      - name: 🚀 自动提交更新
        # 使用 peter-evans/create-pull-request 动作
        uses: peter-evans/create-pull-request@v7
        with:
          # PR 的标题
          title: "自动更新脚本生成的文件"
          # 提交信息
          commit-message: "chore: 自动更新 iptv 和 legado 数据"
          # 要提交的文件路径（相对于仓库根目录）
          paths: |
            source/iptv/
            source/legado/
          # 分支名称（会自动创建）
          branch: auto-update-files
          # 删除已存在的同名 PR（可选）
          delete-branch: true