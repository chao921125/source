name: 🚀 自动执行 IPTV 和 Legado 脚本

# 触发器配置
on:
  # 1. 允许手动点击运行（在 Actions 标签页）
  workflow_dispatch:

  # 2. 定时自动运行（可选）：设置为每天北京时间 08:00 执行
  # 注意：GitHub 使用 UTC 时间，北京时间 8:00 = UTC 0:00
  schedule:
    - cron: '0 0 * * *'

# 任务定义
jobs:
  run-scripts:
    # 运行环境：使用 Ubuntu (Linux)
    # 注意：如果你的脚本严重依赖 macOS 特有的命令，可能需要使用 macos-latest，但速度较慢且费用较高
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # 步骤 1: 检出代码
      # ---------------------------------------------------
      - name: 📥 拉取仓库代码
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 步骤 2: 处理代理 (关键步骤)
      # ---------------------------------------------------
      # 你可以在工作流中直接修改脚本内容：
      - name: 🛠️ 修复脚本
        run: |
          # 检查脚本内容
          cat run.sh
          # 使用 sed 命令删除包含 "proxy" 的第一行
          sed -i '1d' run.sh
          # 查看修改后的脚本确认
          cat run.sh

      # ---------------------------------------------------
      # 步骤 3: 执行脚本
      # ---------------------------------------------------
      - name: ⚙️ 赋予执行权限并运行
        run: |
          # 给脚本添加可执行权限
          chmod +x run.sh
          
          # 运行脚本
          # 注意：GitHub Actions 中的路径是 Linux 风格的
          # 原脚本中的 /Users/... 路径在 Linux 容器中是不存在的，但因为我们已经 checkout 了代码
          # 相对路径或者直接执行应该没问题，但如果脚本里硬编码了绝对路径，可能会报错
          ./run.sh

      # ---------------------------------------------------
      # 步骤 4: 保存结果 (可选)
      # ---------------------------------------------------
      # 如果你的脚本运行后生成了新的文件（比如更新了 m3u 文件），建议上传回来
      - name: 📤 上传生成的文件 (示例)
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            # 这里填写你脚本生成的文件路径，例如：
            # /Users/huangchao/Work/GitHub/source/iptv/output/
            # 或者相对路径
            source/iptv/
            source/legado/